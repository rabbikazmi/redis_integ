services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # app:
  #   build: .
  #   environment:
  #     - REDIS_HOST=redis
  #   depends_on:
  #     redis:
  #       condition: service_healthy

volumes:
  redis_data:

